<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Token Manager | Kaaa Offc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .text-gradient { background: linear-gradient(to right, #38bdf8, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-5">
    <div class="glass w-full max-w-sm rounded-[2.5rem] p-10 animate__animated animate__fadeIn">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tighter">Git<span class="text-blue-500">Hub</span></h1>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.4em] font-bold mt-1">Database Sync</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="newToken" placeholder="Enter Bot Token..." 
                class="w-full bg-black/50 border border-white/10 rounded-2xl px-5 py-4 text-white text-center focus:outline-none focus:border-blue-500 transition-all font-medium">

            <button onclick="submitToken()" id="btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                <span id="btnText">ADD TO GITHUB</span>
            </button>
            
            <div id="status" class="hidden text-center p-3 rounded-2xl text-xs font-bold animate__animated animate__fadeIn"></div>
        </div>

        <div class="mt-10 pt-6 border-t border-white/5 text-center">
            <p class="text-[10px] text-gray-500 tracking-[0.3em] mb-1 uppercase">Total Token di Add</p>
            <div class="text-4xl font-black text-gradient animate__animated animate__pulse animate__infinite" id="totalCount">0</div>
        </div>
    </div>

    <!-- Footer Clickable ke WA -->
    <a href="https://wa.me/6285137572401" target="_blank" class="mt-12 text-center group transition-all duration-300 hover:scale-110">
        <p class="text-gray-600 text-[9px] tracking-[0.6em] mb-2 group-hover:text-blue-400">CONTACT DEVELOPER</p>
        <p class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-white to-purple-500 font-extrabold text-2xl tracking-tighter">
            ©2026 kaaa offc
        </p>
    </a>

    <script>
        async function fetchTotal() {
            try {
                const res = await fetch('/api/add-token');
                const data = await res.json();
                document.getElementById('totalCount').innerText = data.total || 0;
            } catch (e) { console.log("Fetch error"); }
        }
        fetchTotal();

        async function submitToken() {
            const newToken = document.getElementById('newToken').value;
            const status = document.getElementById('status');
            const btnText = document.getElementById('btnText');

            if (!newToken) return;
            btnText.innerText = "UPDATING...";

            try {
                const res = await fetch('/api/add-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newToken })
                });
                const data = await res.json();
                if (data.success) {
                    showStatus("SUCCESS ADD TO GITHUB!", "bg-green-500/10 text-green-400");
                    document.getElementById('newToken').value = "";
                    fetchTotal();
                } else {
                    showStatus("ERROR: " + data.error, "bg-red-500/10 text-red-400");
                }
            } catch (err) {
                showStatus("CONNECTION FAILED", "bg-red-500/10 text-red-400");
            } finally {
                btnText.innerText = "ADD TO GITHUB";
            }
        }

        function showStatus(msg, classes) {
            const status = document.getElementById('status');
            status.innerText = msg;
            status.className = `text-center p-3 rounded-2xl text-xs font-bold animate__animated animate__shakeX ${classes}`;
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 4000);
        }
    </script>
</body>
</html>
